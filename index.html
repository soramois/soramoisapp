<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Willing - Sora Mois</title>
    <style>
        :root {
            --turquesa: #0da1b6;
            --verde-lima: #86e241;
            --blanco: #ffffff;
            --gris-suave: #f4f9f9;
            --texto: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-suave);
            color: var(--texto);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--blanco);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(13, 161, 182, 0.1);
            box-sizing: border-box;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--gris-suave);
            padding-bottom: 15px;
        }
        .greeting {
            font-size: 22px;
            font-weight: bold;
            color: var(--turquesa);
        }
        .logo-container img {
            width: 65px;
            height: 65px;
            object-fit: contain;
        }
        .widget-compacto {
            background: linear-gradient(135deg, var(--turquesa), #097d8d);
            color: var(--blanco);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(13, 161, 182, 0.3);
            border-left: 6px solid var(--verde-lima);
            line-height: 1.4;
            font-style: italic;
        }
        .inspiration-card {
            background: linear-gradient(to bottom, #e0f7fa, #f1f8e9);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(13, 161, 182, 0.15);
        }
        .inspiration-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }
        .prayer-day {
            padding: 15px;
            text-align: center;
            font-style: italic;
            font-size: 15px;
            color: #444;
            line-height: 1.5;
        }
        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .action-btn {
            background-color: var(--blanco);
            border: 2px solid var(--turquesa);
            color: var(--turquesa);
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .action-btn:hover {
            background-color: var(--gris-suave);
        }
        .content-display {
            margin-top: 2px;
            padding: 15px;
            background: var(--gris-suave);
            border-radius: 12px;
            font-size: 14.5px;
            display: none;
            border-left: 4px solid var(--verde-lima);
            line-height: 1.5;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .config-section {
            background: #fff8e1;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #ffe082;
            display: none;
        }
        .config-section input[type="text"] {
            padding: 8px;
            margin: 5px 0 12px 0;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .time-picker-row {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }
        .time-picker-row input[type="time"] {
            flex: 1;
            padding: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .time-picker-row button {
            background: var(--verde-lima);
            color: #333;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .hours-tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
        }
        .hour-tag {
            background: var(--turquesa);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .hour-tag span {
            cursor: pointer;
            font-weight: bold;
            color: #ffcdd2;
        }
        .btn-main-save {
            background: var(--turquesa);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .gear-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--turquesa);
        }
        .volume-container {
            margin: 15px 0 5px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #555;
            background: rgba(255,255,255,0.5);
            padding: 10px;
            border-radius: 8px;
        }
        .volume-container input[type="range"] {
            flex: 1;
            accent-color: var(--turquesa);
            cursor: pointer;
        }
        .setting-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--turquesa);
        }
        .btn-test-sound {
            background: var(--blanco);
            border: 1px solid var(--turquesa);
            color: var(--turquesa);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Configuración Inicial -->
    <div id="config-box" class="config-section">
        <strong>⚙️ Configuración del espacio:</strong>
        <input type="text" id="username-input" placeholder="Tu nombre">
        
        <label><strong>Programar horas de atención:</strong></label>
        <div class="time-picker-row">
            <input type="time" id="reminder-time-input">
            <button type="button" id="btn-add-hour">+</button>
        </div>
        <div class="hours-tag-container" id="hours-tags"></div>
        
        <!-- Control de Volumen (Reemplaza al interruptor) -->
        <div class="volume-container">
            <span>🔉</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
            <span>🔊</span>
        </div>
        <button type="button" class="btn-test-sound" id="btn-test-sound">Probar Volumen de Campana</button>

        <label class="setting-row">
            <input type="checkbox" id="wakelock-checkbox" checked>
            ☀️ Mantener pantalla encendida
        </label>
        
        <button class="btn-main-save" id="btn-save-config">Guardar y Comenzar</button>
    </div>

    <!-- Cabecera -->
    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <button class="gear-btn" id="btn-open-config">⚙️</button>
            <div class="greeting" id="user-greeting">¡Hola!</div>
        </div>
        <div class="logo-container">
            <img src="logo.png" onerror="this.style.display='none';" alt="Logo">
        </div>
    </div>

    <!-- Llamada Dinámica Superior -->
    <div class="widget-compacto" id="text-llamada">
        "Cargando presencia divina..."
    </div>

    <!-- Zona Central Inspiración -->
    <div class="inspiration-card">
        <img id="main-inspiration-photo" src="" class="inspiration-img" alt="Espacio de Luz" style="display:none;" onerror="this.style.display='none';">
        <div class="prayer-day">
            <strong>Palabra de Vida Eterna:</strong><br><br>
            <span id="text-oracion-central">Cargando Palabra...</span>
        </div>
    </div>

    <!-- Botones de Acción Estructurados -->
    <div class="buttons-grid">
        <button class="action-btn" id="btn-luz">Luz para hoy <span>▼</span></button>
        <div id="content-luz" class="content-display"></div>

        <button class="action-btn" id="btn-oracion">Oración <span>▼</span></button>
        <div id="content-oracion" class="content-display"></div>

        <button class="action-btn" id="btn-examen">Examen <span>▼</span></button>
        <div id="content-examen" class="content-display"></div>

        <button class="action-btn" id="btn-intencion">Intención <span>▼</span></button>
        <div id="content-intencion" class="content-display"></div>
    </div>
</div>

<script>
    var listaHoras = [];
    var audioCtx = null;
    var wakeLock = null;

    // --- FUNCIONES DEL SISTEMA ---
    
    async function requestWakeLock() {
        var isWakeLockEnabled = document.getElementById('wakelock-checkbox').checked;
        if (isWakeLockEnabled && 'wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.log("No se pudo mantener la pantalla encendida.");
            }
        }
    }

    function desbloquearAudioSistema() {
        try {
            var AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (AudioContextClass && !audioCtx) {
                audioCtx = new AudioContextClass();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        } catch (e) {}
    }

    // Generador de Campana (Ahora respeta el deslizador de volumen)
    function playSynthesizedChime() {
        try {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Leer el volumen actual de la barra (de 0.0 a 1.0)
            var globalVolume = parseFloat(document.getElementById('volume-slider').value);
            
            var ahora = audioCtx.currentTime;
            var frecuencias = [110.00, 220.00, 261.63, 329.63, 440.00];
            var ganancias = [0.35, 0.30, 0.22, 0.15, 0.10];
            var duraciones = [4.5, 3.5, 3.0, 2.2, 1.2];

            for (var i = 0; i < frecuencias.length; i++) {
                var osc = audioCtx.createOscillator();
                var gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(frecuencias[i], ahora);
                
                // Aplicar el multiplicador de volumen elegido por el usuario
                var gananciaFinal = ganancias[i] * globalVolume;
                
                gainNode.gain.setValueAtTime(gananciaFinal, ahora);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ahora + duraciones[i]);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(ahora);
                osc.stop(ahora + duraciones[i]);
            }
        } catch (e) {}
    }

    function toggleContent(id) {
        var element = document.getElementById('content-' + id);
        if(element.style.display === 'block') {
            element.style.display = 'none';
        } else {
            ['luz', 'oracion', 'examen', 'intencion'].forEach(function(sec) {
                var el = document.getElementById('content-' + sec);
                if(el) el.style.display = 'none';
            });
            element.style.display = 'block';
        }
    }

    function addHourToList() {
        var timeInput = document.getElementById('reminder-time-input');
        var nuevaHora = timeInput.value;
        if(nuevaHora && listaHoras.indexOf(nuevaHora) === -1) {
            listaHoras.push(nuevaHora);
            listaHoras.sort();
            renderHoursTags();
            timeInput.value = "";
        }
    }

    function removeHour(index) {
        listaHoras.splice(index, 1);
        renderHoursTags();
    }

    function renderHoursTags() {
        var container = document.getElementById('hours-tags');
        container.innerHTML = "";
        listaHoras.forEach(function(hora, index) {
            var tag = document.createElement('div');
            tag.className = 'hour-tag';
            
            var spanX = document.createElement('span');
            spanX.innerText = "×";
            spanX.style.marginLeft = "5px";
            spanX.addEventListener('click', function() {
                removeHour(index);
            });

            tag.innerText = hora;
            tag.appendChild(spanX);
            container.appendChild(tag);
        });
    }

    function saveConfiguration() {
        if (window.Notification && Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        var name = document.getElementById('username-input').value;
        if(name) {
            localStorage.setItem('app_user_name', name);
            document.getElementById('user-greeting').innerText = "¡Hola, " + name + "!";
        }
        
        localStorage.setItem('app_user_hours', JSON.stringify(listaHoras));
        
        // Guardar el nivel de volumen elegido
        var volumeLevel = document.getElementById('volume-slider').value;
        localStorage.setItem('app_volume_level', volumeLevel);
        
        localStorage.setItem('app_wakelock_enabled', document.getElementById('wakelock-checkbox').checked);
        
        document.getElementById('config-box').style.display = 'none';
        
        desbloquearAudioSistema();
        requestWakeLock();
        alert("¡Configuración guardada! La campana sonará a las horas indicadas.");
    }

    function showNotification() {
        // La campana ahora siempre suena (con el volumen elegido)
        desbloquearAudioSistema();
        playSynthesizedChime();

        if (window.Notification && Notification.permission === "granted") {
            var notif = new Notification("Momento de Conexión - God Willing", {
                body: "Recuerda: eres un hijo amadísimo de Dios. Toca aquí para ver tu mensaje.",
                icon: "logo.png"
            });
            notif.onclick = function() {
                window.focus();
                desbloquearAudioSistema();
                playSynthesizedChime();
            };
        }
    }

    function iniciarApp() {
        var savedName = localStorage.getItem('app_user_name');
        if(savedName) {
            document.getElementById('user-greeting').innerText = "¡Hola, " + savedName + "!";
        } else {
            document.getElementById('config-box').style.display = 'block';
        }
        
        var savedHours = localStorage.getItem('app_user_hours');
        if(savedHours) {
            listaHoras = JSON.parse(savedHours);
            renderHoursTags();
        }

        // Cargar el volumen si existe
        var savedVolume = localStorage.getItem('app_volume_level');
        if(savedVolume !== null) {
            document.getElementById('volume-slider').value = savedVolume;
        }

        var savedWakeLock = localStorage.getItem('app_wakelock_enabled');
        if(savedWakeLock !== null) {
            document.getElementById('wakelock-checkbox').checked = (savedWakeLock === 'true');
        }

        fetch('./oraciones.json')
            .then(function(res) { return res.json(); })
            .then(function(oraciones) {
                var historialRaw = localStorage.getItem('app_historial_oraciones');
                var historial = historialRaw ? JSON.parse(historialRaw) : [];
                var disponibles = oraciones.filter(function(o) { return historial.indexOf(o.id) === -1; });
                if (disponibles.length === 0) { historial = []; disponibles = oraciones; }
                
                var indiceAleatorio = Math.floor(Math.random() * disponibles.length);
                var datosHoy = disponibles[indiceAleatorio];
                
                historial.push(datosHoy.id);
                localStorage.setItem('app_historial_oraciones', JSON.stringify(historial));
                
                document.getElementById('text-llamada').innerText = '"' + (datosHoy.llamada || '') + '"';
                var fotoCentral = document.getElementById('main-inspiration-photo');
                if (datosHoy.imagen && datosHoy.imagen.trim() !== "") {
                    fotoCentral.src = datosHoy.imagen;
                    fotoCentral.style.display = 'block';
                }
                document.getElementById('text-oracion-central').innerHTML = datosHoy.palabra || '';
                document.getElementById('content-luz').innerHTML = "<strong>Luz para hoy:</strong><br>" + (datosHoy.luz || '');
                document.getElementById('content-oracion').innerHTML = "<strong>Oración:</strong><br>" + (datosHoy.oracion || '');
                document.getElementById('content-examen').innerHTML = "<strong>Examen:</strong><br>" + (datosHoy.examen || '');
                document.getElementById('content-intencion').innerHTML = "<strong>Intención:</strong><br>" + (datosHoy.intencion || '');
            })
            .catch(function(err) {
                document.getElementById('text-llamada').innerText = '"Te tengo abrazado. Sigamos juntos."';
                document.getElementById('text-oracion-central').innerHTML = "«Permaneced en mí, como yo en vosotros.»<br><small>(Juan 15,4)</small>";
            });

        // Reloj verificador
        setInterval(function() {
            if (listaHoras.length > 0) {
                var ahora = new Date();
                var hrs = ahora.getHours();
                var mins = ahora.getMinutes();
                var horaActual = (hrs < 10 ? '0' + hrs : hrs) + ":" + (mins < 10 ? '0' + mins : mins);
                
                if (listaHoras.indexOf(horaActual) !== -1) {
                    if (window.lastNotifiedMinute !== horaActual) {
                        showNotification();
                        window.lastNotifiedMinute = horaActual; 
                    }
                }
            }
        }, 10000);
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('btn-open-config').addEventListener('click', function() {
            var box = document.getElementById('config-box');
            box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
        });
        
        document.getElementById('btn-add-hour').addEventListener('click', addHourToList);
        
        // El botón probar sonido solo ejecuta la campana para ver el volumen actual
        document.getElementById('btn-test-sound').addEventListener('click', function() {
            desbloquearAudioSistema();
            playSynthesizedChime();
        });
        
        // Si el usuario mueve la barra, suena un poquito para que note el volumen
        document.getElementById('volume-slider').addEventListener('change', function() {
            desbloquearAudioSistema();
            playSynthesizedChime();
        });

        document.getElementById('btn-save-config').addEventListener('click', saveConfiguration);

        ['luz', 'oracion', 'examen', 'intencion'].forEach(function(sec) {
            document.getElementById('btn-' + sec).addEventListener('click', function() { toggleContent(sec); });
        });

        document.body.addEventListener('click', desbloquearAudioSistema);
        document.body.addEventListener('touchstart', desbloquearAudioSistema);
        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'visible') requestWakeLock();
        });

        iniciarApp();
    });

</script>

</body>
</html>
