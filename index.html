<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Willing - Sora Mois</title>
    <style>
        :root {
            --turquesa: #0da1b6;
            --verde-lima: #86e241;
            --blanco: #ffffff;
            --gris-suave: #f4f9f9;
            --texto: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-suave);
            color: var(--texto);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--blanco);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(13, 161, 182, 0.1);
            box-sizing: border-box;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--gris-suave);
            padding-bottom: 15px;
        }
        .greeting {
            font-size: 22px;
            font-weight: bold;
            color: var(--turquesa);
        }
        .logo-container img {
            width: 65px;
            height: 65px;
            object-fit: contain;
        }
        .widget-compacto {
            background: linear-gradient(135deg, var(--turquesa), #097d8d);
            color: var(--blanco);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(13, 161, 182, 0.3);
            border-left: 6px solid var(--verde-lima);
            line-height: 1.4;
            font-style: italic;
        }
        .inspiration-card {
            background: linear-gradient(to bottom, #e0f7fa, #f1f8e9);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(13, 161, 182, 0.15);
        }
        .inspiration-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }
        .prayer-day {
            padding: 15px;
            text-align: center;
            font-style: italic;
            font-size: 15px;
            color: #444;
            line-height: 1.5;
        }
        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .action-btn {
            background-color: var(--blanco);
            border: 2px solid var(--turquesa);
            color: var(--turquesa);
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .action-btn:hover {
            background-color: var(--gris-suave);
        }
        .content-display {
            margin-top: 2px;
            padding: 15px;
            background: var(--gris-suave);
            border-radius: 12px;
            font-size: 14.5px;
            display: none;
            border-left: 4px solid var(--verde-lima);
            line-height: 1.5;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .config-section {
            background: #fff8e1;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #ffe082;
        }
        .config-section input[type="text"] {
            padding: 8px;
            margin: 5px 0 12px 0;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .time-picker-row {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }
        .time-picker-row input[type="time"] {
            flex: 1;
            padding: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .time-picker-row button {
            background: var(--verde-lima);
            color: #333;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .hour-tag {
            background: var(--turquesa);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .hour-tag span {
            cursor: pointer;
            font-weight: bold;
            color: #ffcdd2;
        }
        .btn-main-save {
            background: var(--turquesa);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .gear-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--turquesa);
        }
        .btn-test-sound {
            background: #e0f2f1;
            color: var(--turquesa);
            border: 1px dashed var(--turquesa);
            padding: 8px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Configuración Inicial -->
    <div id="config-box" class="config-section">
        <strong>⚙️ Configuración del espacio:</strong>
        <input type="text" id="username-input" placeholder="Tu nombre">
        
        <label><strong>Programar horas de atención:</strong></label>
        <div class="time-picker-row">
            <input type="time" id="reminder-time-input">
            <button type="button" onclick="addHourToList()">+</button>
        </div>
        <div id="hours-tags" style="display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0;"></div>
        
        <!-- Opción programable para el sonido -->
        <label style="display: flex; align-items: center; gap: 8px; margin-top: 15px; margin-bottom: 5px; cursor: pointer;">
            <input type="checkbox" id="sound-toggle" checked style="width: auto; margin: 0;">
            <strong>🔔 Activar sonido de campana</strong>
        </label>

        <!-- NUEVO: Botón para probar la campana en el acto -->
        <button type="button" class="btn-test-sound" onclick="playSynthesizedChime()">🔊 Probar toque de campana ahora</button>
        
        <button class="btn-main-save" onclick="saveConfiguration()">Guardar y Comenzar</button>
    </div>

    <!-- Cabecera -->
    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <button class="gear-btn" onclick="document.getElementById('config-box').style.display = 'block'">⚙️</button>
            <div class="greeting" id="user-greeting">¡Hola!</div>
        </div>
        <div class="logo-container">
            <img src="logo.png" onerror="this.src='https://via.placeholder.com/65?text=SM'" alt="Logo">
        </div>
    </div>

    <!-- Llamada Dinámica Superior -->
    <div class="widget-compacto" id="text-llamada">
        "Cargando presencia divina..."
    </div>

    <!-- Zona Central Inspiración -->
    <div class="inspiration-card">
        <img id="main-inspiration-photo" src="https://images.unsplash.com/photo-1470252649358-96f3c8024252?q=80&w=600&auto=format&fit=cover" class="inspiration-img" alt="Espacio de Luz">
        <div class="prayer-day">
            <strong>Palabra de Vida Eterna:</strong><br><br>
            <span id="text-oracion-central">Cargando Palabra...</span>
        </div>
    </div>

    <!-- Botones de Acción Estructurados -->
    <div class="buttons-grid">
        <button class="action-btn" onclick="toggleContent('luz')">Luz para hoy <span>▼</span></button>
        <div id="content-luz" class="content-display"></div>

        <button class="action-btn" onclick="toggleContent('oracion')">Oración <span>▼</span></button>
        <div id="content-oracion" class="content-display"></div>

        <button class="action-btn" onclick="toggleContent('examen')">Examen <span>▼</span></button>
        <div id="content-examen" class="content-display"></div>

        <button class="action-btn" onclick="toggleContent('intencion')">Intención <span>▼</span></button>
        <div id="content-intencion" class="content-display"></div>
    </div>
</div>

<script>
    var listaHoras = [];
    var audioCtx = null;

    function desbloquearAudioSistema() {
        try {
            var AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (AudioContextClass && !audioCtx) {
                audioCtx = new AudioContextClass();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        } catch (e) {
            console.log("No se pudo iniciar el motor de audio:", e);
        }
    }

    window.onclick = function() { desbloquearAudioSistema(); };
    window.ontouchstart = function() { desbloquearAudioSistema(); };

    window.onload = function() {
        // 1. Cargar Nombre
        var savedName = localStorage.getItem('app_user_name');
        if(savedName) {
            document.getElementById('user-greeting').innerText = "¡Hola, " + savedName + "!";
            document.getElementById('config-box').style.display = 'none';
        }
        
        // 2. Cargar Horas
        var savedHours = localStorage.getItem('app_user_hours');
        if(savedHours) {
            listaHoras = JSON.parse(savedHours);
            renderHoursTags();
        }

        // 2b. Cargar preferencia del Sonido
        var savedSound = localStorage.getItem('app_user_sound');
        if (savedSound !== null) {
            document.getElementById('sound-toggle').checked = (savedSound === 'true');
        }

        // 3. Cargar el archivo JSON (40 días)[cite: 1]
        fetch('./oraciones.json')
            .then(function(res) { return res.json(); })
            .then(function(oraciones) {
                var historialRaw = localStorage.getItem('app_historial_oraciones');
                var historial = historialRaw ? JSON.parse(historialRaw) : [];
                
                var disponibles = oraciones.filter(function(o) {
                    return historial.indexOf(o.id) === -1;
                });
                
                if (disponibles.length === 0) {
                    historial = [];
                    disponibles = oraciones;
                }
                
                var indiceAleatorio = Math.floor(Math.random() * disponibles.length);
                var datosHoy = disponibles[indiceAleatorio];
                
                historial.push(datosHoy.id);
                localStorage.setItem('app_historial_oraciones', JSON.stringify(historial));
                
                // Pintar datos[cite: 1]
                document.getElementById('text-llamada').innerHTML = '"' + datosHoy.llamada + '"';
                
                var fotoCentral = document.getElementById('main-inspiration-photo');
                fotoCentral.src = datosHoy.imagen;
                fotoCentral.style.display = 'block';

                document.getElementById('text-oracion-central').innerHTML = datosHoy.palabra;
                document.getElementById('content-luz').innerHTML = "<strong>Luz para hoy:</strong><br>" + datosHoy.luz;
                document.getElementById('content-oracion').innerHTML = "<strong>Oración:</strong><br>" + datosHoy.oracion;
                document.getElementById('content-examen').innerHTML = "<strong>Examen:</strong><br>" + datosHoy.examen;
                document.getElementById('content-intencion').innerHTML = "<strong>Intención:</strong><br>" + datosHoy.intencion;
            })
            .catch(function(err) {
                console.error("Error cargando las oraciones: ", err);
                document.getElementById('text-llamada').innerText = '"Te tengo abrazado. Sigamos juntos."';
                document.getElementById('text-oracion-central').innerHTML = "«Permaneced en mí, como yo en vosotros.»<br><small>(Juan 15,4)</small>";
            });

        // 4. Pedir permisos de notificación
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        // 5. Reloj de alarmas (revisa cada 30 segundos)
        setInterval(function() {
            if (listaHoras.length > 0) {
                var ahora = new Date();
                var hrs = ahora.getHours();
                var mins = ahora.getMinutes();
                var horaActual = (hrs < 10 ? '0' + hrs : hrs) + ":" + (mins < 10 ? '0' + mins : mins);
                
                if (listaHoras.indexOf(horaActual) !== -1) {
                    if (window.lastNotifiedMinute !== horaActual) {
                        showNotification();
                        window.lastNotifiedMinute = horaActual; 
                    }
                }
            }
        }, 30000);
    }

    function addHourToList() {
        var timeInput = document.getElementById('reminder-time-input');
        var nuevaHora = timeInput.value;
        if(nuevaHora && listaHoras.indexOf(nuevaHora) === -1) {
            listaHoras.push(nuevaHora);
            listaHoras.sort();
            renderHoursTags();
            timeInput.value = "";
        }
    }

    function removeHour(index) {
        listaHoras.splice(index, 1);
        renderHoursTags();
    }

    function renderHoursTags() {
        var container = document.getElementById('hours-tags');
        container.innerHTML = "";
        listaHoras.forEach(function(hora, index) {
            var tag = document.createElement('div');
            tag.className = 'hour-tag';
            tag.innerHTML = hora + ' <span onclick="removeHour(' + index + ')">×</span>';
            container.appendChild(tag);
        });
    }

    function saveConfiguration() {
        var name = document.getElementById('username-input').value;
        if(name) {
            localStorage.setItem('app_user_name', name);
            document.getElementById('user-greeting').innerText = "¡Hola, " + name + "!";
        }
        localStorage.setItem('app_user_hours', JSON.stringify(listaHoras));
        
        var soundEnabled = document.getElementById('sound-toggle').checked;
        localStorage.setItem('app_user_sound', soundEnabled ? 'true' : 'false');

        document.getElementById('config-box').style.display = 'none';
        alert("¡Configuración guardada correctamente!");
    }

    function toggleContent(id) {
        var element = document.getElementById('content-' + id);
        if(element.style.display === 'block') {
            element.style.display = 'none';
        } else {
            document.querySelectorAll('.content-display').forEach(function(el) { el.style.display = 'none'; });
            element.style.display = 'block';
        }
    }

    // Generador de Campana de Iglesia Católica - Optimizado a prueba de fallos
    function playSynthesizedChime() {
        try {
            var AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (AudioContextClass && !audioCtx) {
                audioCtx = new AudioContextClass();
            }
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            var ahora = audioCtx.currentTime;
            var frecuencias = [110.00, 220.00, 261.63, 329.63, 440.00];
            var ganancias = [0.35, 0.30, 0.22, 0.15, 0.10];
            var duraciones = [4.5, 3.5, 3.0, 2.2, 1.2];

            for (var i = 0; i < frecuencias.length; i++) {
                var osc = audioCtx.createOscillator();
                var gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(frecuencias[i], ahora);
                
                gainNode.gain.setValueAtTime(ganancias[i], ahora);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, ahora + duraciones[i]);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(ahora);
                osc.stop(ahora + duraciones[i]);
            }
        } catch (e) {
            console.log("Error tocando la campana:", e);
        }
    }

    function showNotification() {
        var savedSound = localStorage.getItem('app_user_sound');
        if (savedSound === 'true' || savedSound === null) {
            playSynthesizedChime();
        }

        if (Notification.permission === "granted") {
            new Notification("Momento de Conexión - God Willing", {
                body: "Recuerda: eres un hijo amadísimo de Dios. Permanece unido a Él en tu rutina.",
                icon: "logo.png"
            });
        }
    }
</script>

</body>
</html>
